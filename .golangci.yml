run:
  timeout: 10m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gofmt
    - goimports
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:
  goimports:
    local-prefixes: github.com/midu16/opm-troubleshooting

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
