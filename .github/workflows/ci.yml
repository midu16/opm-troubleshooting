name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgpgme-dev

      - name: Build
        run: make build

      - name: Unit tests
        run: make test

      - name: Functional tests
        run: make test-functional

      - name: Lint
        run: make lint
        env:
          GOTOOLCHAIN: go1.26.4

  build-binaries:
    name: Build binaries for multiple architectures
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ${{ matrix.suffix }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -tags containers_image_openpgp \
            -ldflags "-s -w" \
            -o dist/catalog-bundle-inspect-${{ matrix.suffix }} \
            ./cmd/catalog-bundle-inspect
          chmod +x dist/catalog-bundle-inspect-${{ matrix.suffix }}

      - name: Generate checksums
        run: |
          cd dist
          sha256sum catalog-bundle-inspect-${{ matrix.suffix }} > catalog-bundle-inspect-${{ matrix.suffix }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: catalog-bundle-inspect-${{ matrix.suffix }}
          path: |
            dist/catalog-bundle-inspect-${{ matrix.suffix }}
            dist/catalog-bundle-inspect-${{ matrix.suffix }}.sha256
          retention-days: 30
