name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

      - name: Unit tests
        run: make test

      - name: Functional tests
        run: make test-functional

      - name: Lint
        run: make lint
        env:
          GOTOOLCHAIN: go1.26.4
